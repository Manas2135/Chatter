<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatter - Real Time Chat</title>
    <link rel="stylesheet" href="app.css">
</head>

<body>

    <div id="authOverlay" class="auth-overlay">
        <div class="auth-container">
            <div id="loginForm" class="auth-form active">
                <h2>Chatter</h2>
                <input type="email" id="loginEmail" placeholder="Email" style="margin-bottom: 8px;" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button id="loginBtn">Login</button>
                <button id="goToSignupBtn" class="switch-form-btn secondary-btn" style="margin-top: 10px;">Create an
                    Account</button>
                <a href="#" id="forgotPasswordLink" class="forgot-link">Forgot Password?</a>
                <a href="#" id="showOtpLoginBtn" class="forgot-link" style="margin-top:5px;">Login with OTP instead</a>
                <div id="loginError" class="error-msg"></div>
            </div>

            <div id="otpLoginSection" style="display: none;">
                <h2>Login with OTP</h2>
                <input type="email" id="loginOtpEmail" placeholder="Email" style="margin-bottom: 8px;" required>
                <button id="sendLoginOtpBtn">Send OTP</button>
                <div id="loginOtpGroup" style="display: none; margin-top: 10px;">
                    <input type="text" id="loginOtpCode" placeholder="Enter OTP" maxlength="6">
                    <button id="verifyLoginOtpBtn" style="display: none; margin-top: 10px;">Verify & Login</button>
                </div>
                <div id="loginOtpError" class="error-msg"></div>
                <a href="#" id="backToPasswordLogin" class="back-link">← Back to password login</a>
            </div>

            <div id="signupForm" class="auth-form" style="display: none;">
                <h2>Chatter</h2>
                <input type="text" id="signupName" placeholder="Full Name" style="margin-bottom: 8px;" required>
                <input type="email" id="signupEmail" placeholder="Email" style="margin-bottom: 8px;" required>
                <input type="password" id="signupPassword" placeholder="Password" required>
                <button id="signupBtn">Sign Up</button>
                <button id="goToLoginBtn" class="switch-form-btn secondary-btn" style="margin-top: 10px;">Already have
                    an account? Login</button>
                <div id="signupError" class="error-msg"></div>
            </div>

            <div id="otpForm" class="auth-form" style="display: none;">
                <h2>Verify Email</h2>
                <p>We've sent an OTP to <span id="otpEmail"></span></p>
                <input type="text" id="otpCode" placeholder="Enter 6-digit OTP" maxlength="6">
                <button id="verifyOtpBtn">Verify</button>
                <div id="otpError" class="error-msg"></div>
            </div>

            <div id="forgotForm" class="auth-form" style="display: none;">
                <h2>Reset Password</h2>
                <input type="email" id="forgotEmail" placeholder="Email" required>
                <button id="sendResetOtpBtn">Send OTP</button>
                <div id="forgotError" class="error-msg"></div>
                <a href="#" id="backToLogin" class="back-link">Back to Login</a>
            </div>

            <div id="resetForm" class="auth-form" style="display: none;">
                <h2>Set New Password</h2>
                <input type="text" id="resetOtp" placeholder="Enter OTP" maxlength="6">
                <input type="password" id="newPassword" placeholder="New Password">
                <input type="password" id="confirmPassword" placeholder="Confirm Password">
                <button id="resetPasswordBtn">Reset Password</button>
                <div id="resetError" class="error-msg"></div>
            </div>
        </div>
    </div>

    <div id="chatApp" class="chat-app" style="display: none;">
        <div class="profile-section">
            <div id="profileIcon" class="profile-icon">
                <span id="profileInitial"></span>
            </div>
            <div id="dropdownMenu" class="dropdown-menu">
                <div class="user-info">
                    <strong id="userName"></strong>
                </div>
                <hr>
                <button id="logoutBtn">Logout</button>
            </div>
        </div>

        <div class="main-chat-layout">
            <div class="sidebar">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search users by name...">
                </div>
                <div id="userList" class="user-list"></div>
            </div>

            <div class="chat-area">
                <div id="chatHeader" class="chat-header">
                    <h3>Select a user to start chatting</h3>
                </div>
                <div class="messages-container">
                    <div id="messages" class="messages"></div>
                </div>
                <div id="inputContainer" class="input-container" style="display: none;">
                    <div id="typingIndicator" class="typing-indicator"></div>
                    <div class="message-input-box">
                        <input type="text" id="messageInput" placeholder="Type a message...">
                        <button id="sendBtn">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="user.js"></script>
</body>

</html>
